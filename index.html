<!DOCTYPE html>

<head>

<title>Bindi's Fairy Word Garden</title>

<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FF8FA3">

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/base.css">

<!-- Core -->
<script src="js/core/storage.js"></script>
<script src="js/core/sfx.js"></script>
<script src="js/core/speech.js"></script>
<script src="js/core/progress.js"></script>
<script src="js/core/wordDataLoader.js"></script>
<script src="js/core/sentenceGloss.js"></script>
